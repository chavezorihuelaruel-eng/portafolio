<!DOCTYPE html>
<html>
<head>
<title>Portafolio</title>
<style>
body { background:#020617; color:white; font-family:Arial; }
.card { background:#0f172a; padding:20px; margin:20px; border-radius:10px; }
iframe { width:100%; height:200px; }
button { background:#22c55e; padding:8px; border:none; }
</style>
</head>
<body>

<h1>📚 Portafolio</h1>
<a href="/login.html">Login</a>

<div id="contenedor"></div>

<script>
const semanas = [1,2];

fetch("/trabajos")
.then(r => r.json())
.then(data => {
    const c = document.getElementById("contenedor");

    semanas.forEach(s => {
        let lista = data.filter(t => t.semana == s);
        let html = "";

        lista.forEach(t => {
            html += `
            <p>${t.titulo}</p>
            <iframe src="/uploads/${t.archivo}"></iframe>
            `;
        });

        c.innerHTML += `
        <div class="card">
            <h2>Semana ${s}</h2>
            ${html || "Sin archivos"}

            <form action="/upload" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="semana" value="${s}">
                <input name="titulo" placeholder="Título">
                <input type="file" name="archivo">
                <button>Subir PDF</button>
            </form>
        </div>
        `;
    });
});
</script>

</body>
</html>
